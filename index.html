<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UC Mine Rewards</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
  <style>
    body { margin:0; font-family: system-ui; background:#111; color:#fff; }
    .container { max-width: 500px; margin: 0 auto; padding: 15px; }
    .header { background:#222; padding:15px; border-radius:12px; text-align:center; }
    .profile { display:flex; align-items:center; justify-content:center; gap:15px; margin-bottom:10px; }
    .profile img { width:60px; height:60px; border-radius:50%; border:3px solid #0f0; }
    .points { font-size: 2.8rem; font-weight:bold; color:#0f0; margin:10px 0; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .nav { position:fixed; bottom:0; width:100%; max-width:500px; background:#222; display:flex; justify-content:space-around; padding:10px 0; }
    button { width:100%; padding:15px; margin:10px 0; background:#0a0; color:white; border:none; border-radius:12px; font-size:1.1rem; }
    .mine-btn { background: linear-gradient(#ff0, #f80); font-size:1.4rem; }
    .banner-ad { margin:10px 0; text-align:center; }
  </style>
</head>
<body>
  <div class="container">

    <!-- HOME -->
    <div id="home" class="tab-content active">
      <div class="header">
        <div class="profile">
          <img id="userPhoto" src="https://via.placeholder.com/60" alt="Profile">
          <div>
            <h2 id="userName">User</h2>
            <small id="userId" style="color:#aaa;">ID: 000000</small>
          </div>
        </div>
        <div class="points" id="points">0</div>
        <small>ပွိုင့်</small>
      </div>
      <button id="mineBtn" class="mine-btn">⛏️ မှန်း 2 နာရီ ကြာပြီ – Rewarded Ad ကြည့်ပြီး မှန်း</button>
    </div>

    <!-- TASKS (Interstitial Ad နဲ့ စမ်း) -->
    <div id="tasks" class="tab-content">
      <h2>📋 Tasks</h2>
      <button onclick="showInterstitialAd()" style="background:#f80;">Interstitial Ad ကြည့်ပြီး Task လုပ်မယ် (+50 pts)</button>
    </div>

    <!-- BOX -->
    <div id="box" class="tab-content"><h2>🎁 Mystery Box</h2></div>

    <!-- REDEEM -->
    <div id="redeem" class="tab-content"><h2>🎯 Redeem</h2></div>

    <!-- Banner Ad နေရာ -->
    <div class="banner-ad" id="bannerContainer"></div>
  </div>

  <div class="nav">
    <button onclick="showTab('home')">🏠</button>
    <button onclick="showTab('tasks')">📋</button>
    <button onclick="showTab('box')">🎁</button>
    <button onclick="showTab('redeem')">🎯</button>
  </div>

  <script>
    // ==================== CONFIG ====================
    const API_BASE = "https://uc-mine-backend.onrender.com";
    
    const REWARDED_BLOCK_ID   = "29373";     // ← Rewarded Block ID
    const INTERSTITIAL_BLOCK_ID = "int-29372"; // ← Interstitial Block ID
    const BANNER_BLOCK_ID     = "သင့်_BANNER_BLOCK_ID";       // ← Banner Block ID

    let points = 0;
    let AdRewarded = null;
    let AdInterstitial = null;
    let AdBanner = null;

    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // User Info
    function loadUserInfo() {
      const user = tg.initDataUnsafe?.user;
      if (user) {
        document.getElementById('userName').textContent = user.first_name + (user.last_name ? " " + user.last_name : "");
        document.getElementById('userId').textContent = "ID: " + user.id;
        if (user.photo_url) document.getElementById('userPhoto').src = user.photo_url;
      }
    }

    function updatePoints() { document.getElementById('points').textContent = points; }
    function showTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
    }

    // ==================== ADSGRAM INIT (3 မျိုး) ====================
    async function initAllAds() {
      try {
        AdRewarded = window.Adsgram.init({ blockId: REWARDED_BLOCK_ID });
        AdInterstitial = window.Adsgram.init({ blockId: INTERSTITIAL_BLOCK_ID });
        AdBanner = window.Adsgram.init({ blockId: BANNER_BLOCK_ID });
        console.log("✅ AdsGram 3 မျိုး အားလုံး Ready");
      } catch (e) {
        console.error("AdsGram Init Error", e);
      }
    }

    // ==================== 1. REWARDED AD (Mine) ====================
    document.getElementById('mineBtn').addEventListener('click', async () => {
      const userId = tg.initDataUnsafe?.user?.id || "test123";
      if (!AdRewarded) return alert("❌ Rewarded Ad မနှိုးထားသေးပါ");

      try {
        await AdRewarded.show();
        const res = await fetch(`${API_BASE}/api/claim`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId.toString() })
        });
        const data = await res.json();
        if (data.success) {
          points = data.newPoints || (points + data.reward);
          updatePoints();
          alert(`✅ Rewarded Ad ကြည့်ပြီး ${data.reward} pts ရရှိပါပြီ!`);
        }
      } catch (e) {
        alert("❌ Rewarded Ad ကြည့်မပြီးသေးပါ");
      }
    });

    // ==================== 2. INTERSTITIAL AD (Tasks) ====================
    window.showInterstitialAd = async () => {
      if (!AdInterstitial) return alert("❌ Interstitial Ad မနှိုးထားသေးပါ");
      try {
        await AdInterstitial.show();
        points += 50;
        updatePoints();
        alert("✅ Interstitial Ad ပြီး +50 pts ရရှိပါပြီ!");
      } catch (e) {
        alert("❌ Interstitial Ad ကြည့်မပြီးသေးပါ");
      }
    };

    // ==================== 3. BANNER AD ====================
    async function showBannerAd() {
      if (!AdBanner) return;
      try {
        const banner = await AdBanner.showBanner({ container: document.getElementById('bannerContainer') });
        console.log("Banner shown");
      } catch (e) {
        console.error("Banner Error", e);
      }
    }

    // ==================== INITIAL LOAD ====================
    loadUserInfo();
    updatePoints();
    initAllAds();
    showBannerAd();   // Banner ကို စတင်ပြပါမယ်
  </script>
</body>
</html>
