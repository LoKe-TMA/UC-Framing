<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UC Mine Rewards</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
  <style>
    body { margin:0; font-family: system-ui; background:#111; color:#fff; }
    .container { max-width: 500px; margin: 0 auto; padding: 15px; }
    .header { background:#222; padding:15px; border-radius:12px; text-align:center; }
    .profile { display:flex; align-items:center; justify-content:center; gap:15px; margin-bottom:10px; }
    .profile img { width:60px; height:60px; border-radius:50%; border:3px solid #0f0; }
    .points { font-size: 2.8rem; font-weight:bold; color:#0f0; margin:10px 0; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .nav { position:fixed; bottom:0; width:100%; max-width:500px; background:#222; display:flex; justify-content:space-around; padding:10px 0; }
    button { width:100%; padding:15px; margin:10px 0; background:#0a0; color:white; border:none; border-radius:12px; font-size:1.1rem; }
    .mine-btn { background: linear-gradient(#ff0, #f80); font-size:1.4rem; }
  </style>
</head>
<body>
  <div class="container">

    <!-- HOME -->
    <div id="home" class="tab-content active">
      <div class="header">
        <div class="profile">
          <img id="userPhoto" src="https://via.placeholder.com/60" alt="Profile">
          <div>
            <h2 id="userName">User</h2>
            <small id="userId" style="color:#aaa;">ID: 000000</small>
          </div>
        </div>
        <div class="points" id="points">0</div>
        <small>ပွိုင့်</small>
      </div>
      <button id="mineBtn" class="mine-btn">⛏️ Rewarded Ad ကြည့်ပြီး မှန်း</button>
    </div>

    <!-- TASKS -->
    <div id="tasks" class="tab-content">
      <h2>📋 Tasks</h2>
      <button onclick="completeTaskWithAd()" style="background:#f80; margin:15px 0; padding:20px;">
        📺 Interstitial / Task Ad ကြည့်ပြီး +50 pts ရယူမယ်
      </button>
    </div>

    <div id="box" class="tab-content"><h2>🎁 Mystery Box</h2></div>
    <div id="redeem" class="tab-content"><h2>🎯 Redeem</h2></div>
  </div>

  <div class="nav">
    <button onclick="showTab('home')">🏠</button>
    <button onclick="showTab('tasks')">📋</button>
    <button onclick="showTab('box')">🎁</button>
    <button onclick="showTab('redeem')">🎯</button>
  </div>

  <script>
    const API_BASE = "https://uc-mine-backend.onrender.com";

    const REWARDED_ID = "29373";
    const TASK_ID = "task-29374";
    const INTERSTITIAL_ID = "int-29372";

    let points = 0;
    let AdRewarded = null;
    let AdTask = null;

    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function loadUserInfo() {
      const user = tg.initDataUnsafe?.user;
      if (user) {
        document.getElementById('userName').textContent = user.first_name + (user.last_name ? " " + user.last_name : "");
        document.getElementById('userId').textContent = "ID: " + user.id;
        if (user.photo_url) document.getElementById('userPhoto').src = user.photo_url;
      }
    }

    function updatePoints() {
      document.getElementById('points').textContent = points;
    }

    function showTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
    }

    // Init Ads
    async function initAds() {
      try {
        AdRewarded = window.Adsgram.init({ blockId: REWARDED_ID });
        AdTask = window.Adsgram.init({ blockId: TASK_ID });
        console.log("✅ Ads Initialized Successfully");
      } catch (e) {
        console.error("❌ Ads Init Failed", e);
      }
    }

    // Mine Rewarded Ad
    document.getElementById('mineBtn').addEventListener('click', async () => {
      const userId = tg.initDataUnsafe?.user?.id || "test123";
      if (!AdRewarded) return alert("❌ Rewarded Ad မနှိုးထားသေးပါ");

      try {
        await AdRewarded.show();
        const res = await fetch(`${API_BASE}/api/claim`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ user_id: userId }) });
        const data = await res.json();
        if (data.success) {
          points = data.newPoints || points + data.reward;
          updatePoints();
          alert(`✅ ${data.reward} pts ရရှိပါပြီ!`);
        }
      } catch (e) {
        alert("❌ Rewarded Ad ပြဿနာ ရှိနေပါတယ်");
      }
    });

    // Task Ad (Interstitial / Task)
    window.completeTaskWithAd = async () => {
      const userId = tg.initDataUnsafe?.user?.id || "test123";
      if (!AdTask) return alert("❌ Task Ad မနှိုးထားသေးပါ");

      try {
        console.log("Showing Task Ad...");
        await AdTask.show();
        console.log("Ad shown successfully");

        // Backend ကို ပို့
        const res = await fetch(`${API_BASE}/api/task`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId, task_id: 1 })
        });
        const data = await res.json();

        points += data.reward || 50;
        updatePoints();
        alert(`✅ Task Ad ကြည့်ပြီး +50 pts ရရှိပါပြီ!`);
      } catch (e) {
        console.error("Task Ad Error:", e);
        alert("❌ Task Ad မပေါ်ပါဘူး\n\n" + e.message);
      }
    };

    // Start
    loadUserInfo();
    updatePoints();
    initAds();
  </script>
</body>
</html>
